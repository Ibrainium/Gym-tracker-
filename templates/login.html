{% extends "base.html" %}
{% block title %}Log in · Repset{% endblock %}

{% block content %}
<div class="login-wrap">
    <div class="surface login-card">
        <div class="login-brand brand-font">
            Repset
        </div>
        <h1 class="login-title">Log in</h1>
        <p class="login-sub">Sign in to manage your workouts.</p>

        {% if error %}
        <div class="alert alert-danger py-2" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('auth.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label" for="identifier">Username or email</label>
                <input class="form-control form-control-lg" id="identifier" name="identifier"
                       type="text" autocomplete="username" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input class="form-control form-control-lg" id="password" name="password"
                       type="password" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn btn-volt btn-lg w-100">Log in</button>
        </form>

        <p class="login-alt">
            Don&rsquo;t have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
